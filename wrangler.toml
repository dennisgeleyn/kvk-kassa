name = "kvk-bancontact"
main = "worker.js"
compatibility_date = "2024-01-01"

# Verander naar jouw account ID (te vinden op dash.cloudflare.com)
# account_id = "JOUW_ACCOUNT_ID"

[vars]
# Niet-geheime variabelen
BANCONTACT_ENV = "dev"   # "dev" voor sandbox testen, "ext" voor productie

# Geheime variabelen: NOOIT hier zetten, gebruik wrangler secrets:
#   wrangler secret put PAYCONIQ_API_KEY
#   wrangler secret put ALLOWED_ORIGIN     (bv. http://192.168.1.50)
#   wrangler secret put TERMINAL_TOKEN     (optioneel, willekeurige string)
#   wrangler secret put WEBHOOK_URL        (optioneel, jouw callback URL)
