<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>KVK Kassa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0d0f14;
    --surface:   #161a22;
    --surface2:  #1e2330;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.14);
    --accent:    #ff6200;
    --accent2:   #ff8c42;
    --success:   #22c55e;
    --danger:    #ef4444;
    --warning:   #f59e0b;
    --text:      #f0f0f0;
    --muted:     #7a8299;
    --mono:      'DM Mono', monospace;
    --display:   'Syne', sans-serif;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app {
    min-height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    max-width: 520px;
    margin: 0 auto;
    width: 100%;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    padding: 1rem 0.875rem 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; flex-direction: column; gap: 1px; }
  .brand-name {
    font-family: var(--display);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .brand-name span { color: var(--accent); }
  .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }
  .pq-badge {
    background: #ff6200;
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    font-family: var(--display);
  }

  /* ── Amount display ── */
  .amount-block {
    padding: 1.25rem 0.875rem 0.875rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .amount-label { font-size: 10px; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
  .amount-value {
    font-family: var(--display);
    font-size: clamp(36px, 12vw, 52px);
    font-weight: 700;
    letter-spacing: -2px;
    color: var(--text);
    transition: color 0.2s;
    line-height: 1;
  }
  .amount-value.has-amount { color: var(--accent2); }
  .amount-euro { font-size: 28px; color: var(--muted); font-weight: 500; vertical-align: super; margin-right: 2px; }

  /* ── Description ── */
  .desc-row {
    padding: 0.625rem 0.875rem;
    border-bottom: 1px solid var(--border);
  }
  .desc-row input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .desc-row input::placeholder { color: var(--muted); }
  .desc-row input:focus { border-color: var(--accent); }

  /* ── Category tabs ── */
  .cat-tabs {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .cat-tab {
    padding: 14px 4px 12px;
    font-family: var(--display);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-align: center;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    line-height: 1.2;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-tab-icon { font-size: 22px; line-height: 1; }
  .cat-tab:active { background: rgba(255,255,255,0.04); }
  .cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* -- Item grid -- */
  .items-panel { padding: 0.625rem 0.875rem; border-bottom: 1px solid var(--border); }
  .item-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }
  .item-btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px 8px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    overflow: hidden;
    min-height: 90px;
    justify-content: center;
  }
  .item-btn:active { transform: scale(0.96); }
  .item-btn.selected {
    border-color: var(--accent);
    background: rgba(255,98,0,0.08);
  }
  .item-icon { font-size: 26px; line-height: 1; }
  .item-name { font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.3; }
  .item-price { font-size: 13px; color: var(--accent); font-weight: 500; }
  .item-qty {
    position: absolute;
    top: 4px; right: 5px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .item-btn.selected .item-qty { opacity: 1; }

  /* ── Cart ── */
  .cart-row {
    padding: 0.5rem 0.875rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .cart-empty { font-size: 11px; color: var(--muted); padding: 6px 0; }
  .cart-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .cart-chip:last-child { border-bottom: none; }
  .chip-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .chip-icon { font-size: 16px; flex-shrink: 0; }
  .chip-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip-qty-ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .chip-qty-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
    flex-shrink: 0;
  }
  .chip-qty-btn:hover { background: var(--surface); }
  .chip-qty { font-size: 13px; font-weight: 500; min-width: 16px; text-align: center; color: var(--text); }
  .chip-subtotal { font-size: 13px; color: var(--accent); font-weight: 500; min-width: 44px; text-align: right; flex-shrink: 0; }
  .chip-del {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
    flex-shrink: 0;
    margin-left: 4px;
  }
  .chip-del:hover { background: rgba(239,68,68,0.12); color: var(--danger); border-color: var(--danger); }

  /* ── Custom amount ── */
  .custom-row {
    padding: 0.5rem 0.875rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .custom-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .custom-row input[type=number] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    -moz-appearance: textfield;
  }
  .custom-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .custom-row input[type=number]:focus { border-color: var(--accent); }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .clear-btn:hover { color: var(--danger); border-color: var(--danger); }

  /* ── Pay button ── */
  .pay-section { padding: 0.875rem 0.875rem; }
  .pay-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .pay-btn:hover { opacity: 0.9; }
  .pay-btn:active { transform: scale(0.98); }
  .pay-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── QR overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.visible { opacity: 1; pointer-events: all; }
  .qr-modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 1.5rem;
    max-width: 340px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .modal-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }
  .modal-amount {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -1px;
  }
  .qr-box {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-box img { width: 200px; height: 200px; display: block; }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: var(--display);
  }
  .status-pill.pending { background: rgba(245,158,11,0.15); color: var(--warning); }
  .status-pill.success { background: rgba(34,197,94,0.15); color: var(--success); }
  .status-pill.failed  { background: rgba(239,68,68,0.15);  color: var(--danger); }
  .status-pill.cancelled { background: rgba(122,130,153,0.15); color: var(--muted); }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .status-pill.success .pulse,
  .status-pill.failed .pulse,
  .status-pill.cancelled .pulse { animation: none; }

  .modal-desc { font-size: 12px; color: var(--muted); text-align: center; }
  .modal-ref { font-size: 10px; color: var(--muted); opacity: 0.6; font-family: var(--mono); }

  .modal-actions { display: flex; gap: 8px; width: 100%; }
  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    font-family: var(--display);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    border: none;
  }
  .modal-btn.cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }
  .modal-btn.cancel:hover { color: var(--text); }
  .modal-btn.new { background: var(--accent); color: #fff; display: none; }
  .modal-btn.new.visible { display: block; }
  .modal-btn:hover { opacity: 0.85; }

  /* ── History footer ── */
  .history {
    border-top: 1px solid var(--border);
    padding: 0.75rem 0.875rem;
    max-height: 140px;
    overflow-y: auto;
  }
  .history-title { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .history-item:last-child { border-bottom: none; }
  .h-left { display: flex; flex-direction: column; gap: 1px; }
  .h-amount { font-weight: 500; color: var(--text); }
  .h-desc { font-size: 10px; color: var(--muted); }
  .h-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--display);
    font-weight: 600;
  }
  .h-badge.ok   { background: rgba(34,197,94,0.12);  color: var(--success); }
  .h-badge.fail { background: rgba(239,68,68,0.12);   color: var(--danger); }
  .h-badge.wait { background: rgba(245,158,11,0.12);  color: var(--warning); }
  .h-badge.cancelled { background: rgba(122,130,153,0.12); color: var(--muted); }

  /* ── Loading spinner ── */
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,98,0,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error toast ── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--danger);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-family: var(--display);
    font-weight: 600;
    transition: transform 0.25s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── PIN screen ── */
  .pin-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 500;
    gap: 0;
    transition: opacity 0.3s;
  }
  .pin-screen.hidden { opacity: 0; pointer-events: none; }
  .pin-logo {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .pin-logo span { color: var(--accent); }
  .pin-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 40px;
    letter-spacing: 0.5px;
  }
  .pin-dots {
    display: flex;
    gap: 14px;
    margin-bottom: 36px;
  }
  .pin-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    background: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .pin-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
  }
  .pin-dot.error {
    background: var(--danger);
    border-color: var(--danger);
  }
  .pin-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: min(280px, 85vw);
  }
  .pin-key {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    height: clamp(58px, 16vw, 72px);
    font-family: var(--display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .pin-key:active { background: var(--surface2); transform: scale(0.94); }
  .pin-key.wide { grid-column: span 2; }
  .pin-key.del { font-size: 18px; color: var(--muted); }
  .pin-error-msg {
    margin-top: 20px;
    font-size: 12px;
    color: var(--danger);
    height: 18px;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>
<!-- PIN screen -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">KVK <span>Kassa</span></div>
  <div class="pin-sub">Voer de pincode in</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="pin-grid">
    <div class="pin-key" onclick="pinPress('1')">1</div>
    <div class="pin-key" onclick="pinPress('2')">2</div>
    <div class="pin-key" onclick="pinPress('3')">3</div>
    <div class="pin-key" onclick="pinPress('4')">4</div>
    <div class="pin-key" onclick="pinPress('5')">5</div>
    <div class="pin-key" onclick="pinPress('6')">6</div>
    <div class="pin-key" onclick="pinPress('7')">7</div>
    <div class="pin-key" onclick="pinPress('8')">8</div>
    <div class="pin-key" onclick="pinPress('9')">9</div>
    <div class="pin-key del" onclick="pinDel()">⌫</div>
    <div class="pin-key" onclick="pinPress('0')">0</div>
    <div class="pin-key del" onclick="pinClear()">✕</div>
  </div>
  <div class="pin-error-msg" id="pinError"></div>
</div>

<div class="app">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-name">KVK <span>Kassa</span></div>
      <div class="brand-sub">Kieldrecht · Bancontact Pay</div>
    </div>
    <div class="pq-badge">Bancontact Pay</div>
  </header>

  <!-- Main -->
  <main>
    <!-- Amount -->
    <div class="amount-block">
      <div class="amount-label">Totaal te betalen</div>
      <div class="amount-value" id="amtDisplay">
        <span class="amount-euro">€</span><span id="amtNum">0,00</span>
      </div>
    </div>

    <!-- Description -->
    <div class="desc-row">
      <input type="text" id="descInput" placeholder="Omschrijving (bv. 2× bier + 1× cola)…" maxlength="100" />
    </div>

    <!-- Category tabs -->
    <div class="cat-tabs" id="catTabs"></div>

    <!-- Item grid -->
    <div class="items-panel">
      <div class="item-grid" id="itemGrid"></div>
    </div>

    <!-- Cart chips -->
    <div class="cart-row" id="cartRow">
      <span class="cart-empty">Geen items geselecteerd</span>
    </div>

    <!-- Custom amount -->
    <div class="custom-row">
      <span class="custom-label">Vrij bedrag</span>
      <input type="number" id="customAmt" placeholder="0.00" min="0.01" step="0.01" />
      <button class="clear-btn" onclick="clearAll()">Alles wissen</button>
    </div>

    <!-- Pay -->
    <div class="pay-section">
      <button class="pay-btn" id="payBtn" onclick="initPayment()">Genereer QR-code</button>
    </div>

    <!-- History -->
    <div class="history" id="historyPanel" style="display:none">
      <div class="history-title">Recente betalingen</div>
      <div id="historyList"></div>
    </div>
  </main>

</div>

<!-- QR Overlay -->
<div class="overlay" id="overlay">
  <div class="qr-modal">
    <div class="modal-title">Scan met Bancontact Pay</div>
    <div class="modal-amount" id="modalAmount">€ 0,00</div>
    <div class="qr-box" id="qrBox">
      <div class="spinner" id="qrSpinner"></div>
      <img id="qrImg" src="" alt="QR code" style="display:none" />
    </div>
    <div class="status-pill pending" id="statusPill">
      <div class="pulse"></div>
      <span id="statusText">Wacht op betaling…</span>
    </div>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="modal-ref" id="modalRef"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="cancelBtn" onclick="cancelPayment()">Annuleren</button>
      <button class="modal-btn new" id="newBtn" onclick="closeAndReset()">+ Nieuwe betaling</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────
// Vervang dit door de URL van jouw Cloudflare Worker
const WORKER_URL = 'https://kvk-bancontact.JOUW-NAAM.workers.dev';
const DEMO_MODE = true;  // ← zet op false zodra de Worker live is
const PIN = '1234';      // ← verander dit naar jullie eigen pincode

// ── MENU ────────────────────────────────────────────────────────────
// Pas dit aan na ontvangst van de echte prijslijst
const MENU = [
  {
    cat: 'Bier',
    icon: '🍺',
    items: [
      { name: 'Stella Artois',     price: 2.00, icon: '🍺' },
      { name: 'Stella 0,0',        price: 2.00, icon: '🍺' },
      { name: 'Palm',              price: 2.00, icon: '🍺' },
      { name: 'Hoegaarden',        price: 2.00, icon: '🍺' },

// ── STATE ────────────────────────────────────────────────────────────
let cart = {};        // { "Bieren|Pils": { item, qty, cat } }
let customCents = 0;
let activeCat = MENU[0].cat;
let currentPaymentId = null;
let pollTimer = null;
let txHistory = [];

// ── INIT ─────────────────────────────────────────────────────────────
function buildTabs() {
  const el = document.getElementById('catTabs');
  el.innerHTML = MENU.map(c =>
    `<div class="cat-tab${c.cat === activeCat ? ' active' : ''}" onclick="switchCat('${c.cat}')"><span class="cat-tab-icon">${c.icon}</span>${c.cat}</div>`
  ).join('');
}

function buildGrid() {
  const cat = MENU.find(c => c.cat === activeCat);
  if (!cat) return;
  const el = document.getElementById('itemGrid');
  el.innerHTML = cat.items.map(item => {
    const key = `${activeCat}|${item.name}`;
    const qty = cart[key]?.qty || 0;
    return `
      <div class="item-btn${qty > 0 ? ' selected' : ''}" onclick="toggleItem('${activeCat}','${item.name}',${item.price},'${item.icon}')">
        <div class="item-qty">${qty > 0 ? qty : ''}</div>
        <div class="item-icon">${item.icon}</div>
        <div class="item-name">${item.name}</div>
        <div class="item-price">€ ${item.price.toFixed(2).replace('.',',')}</div>
      </div>`;
  }).join('');
}

function switchCat(cat) {
  activeCat = cat;
  buildTabs();
  buildGrid();
}

function toggleItem(cat, name, price, icon) {
  const key = `${cat}|${name}`;
  if (cart[key]) {
    cart[key].qty++;
  } else {
    cart[key] = { name, price, icon, qty: 1 };
  }
  customCents = 0;
  document.getElementById('customAmt').value = '';
  buildGrid();
  renderCart();
  updateAmount();
}

function removeChip(key) {
  delete cart[key];
  buildGrid();
  renderCart();
  updateAmount();
}

function renderCart() {
  const el = document.getElementById('cartRow');
  const keys = Object.keys(cart);
  if (keys.length === 0) {
    el.innerHTML = '<span class="cart-empty">Geen items geselecteerd</span>';
    return;
  }
  el.innerHTML = keys.map(k => {
    const c = cart[k];
    const sub = (c.price * c.qty).toFixed(2).replace('.', ',');
    return `<div class="cart-chip">
      <div class="chip-left">
        <span class="chip-icon">${c.icon}</span>
        <span class="chip-name">${c.name}</span>
      </div>
      <div class="chip-qty-ctrl">
        <button class="chip-qty-btn" onclick="adjustQty('${k}', -1)">−</button>
        <span class="chip-qty">${c.qty}</span>
        <button class="chip-qty-btn" onclick="adjustQty('${k}', 1)">+</button>
      </div>
      <span class="chip-subtotal">€ ${sub}</span>
      <button class="chip-del" onclick="removeChip('${k}')" title="Verwijderen">✕</button>
    </div>`;
  }).join('');
}

function adjustQty(key, delta) {
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) delete cart[key];
  buildGrid();
  renderCart();
  updateAmount();
}

function updateAmount() {
  const cartTotal = Object.values(cart).reduce((s, c) => s + c.price * c.qty, 0);
  const total = customCents > 0 ? customCents / 100 : cartTotal;
  const el = document.getElementById('amtDisplay');
  document.getElementById('amtNum').textContent = total.toFixed(2).replace('.', ',');
  el.classList.toggle('has-amount', total > 0);
}

document.getElementById('customAmt').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  customCents = isNaN(v) || v <= 0 ? 0 : Math.round(v * 100);
  if (customCents > 0) {
    Object.keys(cart).forEach(k => delete cart[k]);
    buildGrid();
    renderCart();
  }
  updateAmount();
});

function clearAll() {
  Object.keys(cart).forEach(k => delete cart[k]);
  customCents = 0;
  document.getElementById('customAmt').value = '';
  document.getElementById('descInput').value = '';
  buildGrid();
  renderCart();
  updateAmount();
}

// ── TOTAL IN CENTS ────────────────────────────────────────────────────
function getTotalCents() {
  if (customCents > 0) return customCents;
  return Math.round(Object.values(cart).reduce((s, c) => s + c.price * c.qty, 0) * 100);
}

function getDescription() {
  const manual = document.getElementById('descInput').value.trim();
  if (manual) return manual;
  if (customCents > 0) return 'KVK vrij bedrag';
  return Object.values(cart).map(c => `${c.qty > 1 ? c.qty + '× ' : ''}${c.name}`).join(', ');
}

// ── PAYMENT FLOW ──────────────────────────────────────────────────────
async function initPayment() {
  const cents = getTotalCents();
  if (cents <= 0) { showToast('Kies eerst een bedrag of product.'); return; }

  const desc = getDescription();
  const ref = 'KVK-' + Date.now();

  document.getElementById('payBtn').disabled = true;
  openOverlay(cents, desc, ref);

  if (DEMO_MODE) {
    // Simuleer netwerkvertraging van 1,2 seconden
    await new Promise(r => setTimeout(r, 1200));
    const fakeId = 'DEMO-' + Math.random().toString(36).substr(2, 8).toUpperCase();
    currentPaymentId = fakeId;
    // Genereer een echte scannbare QR met een nep-checkout URL
    const fakeUrl = 'https://payconiq.com/pay/2/demo-' + fakeId;
    document.getElementById('qrSpinner').style.display = 'none';
    document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(fakeUrl);
    document.getElementById('qrImg').style.display = 'block';
    startDemoPolling(fakeId, cents, desc);
    return;
  }

  try {
    const res = await fetch(`${WORKER_URL}/payment`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amountCents: cents, description: desc, reference: ref }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    currentPaymentId = data.paymentId;

    document.getElementById('qrSpinner').style.display = 'none';
    document.getElementById('qrImg').src = data.qrUrl;
    document.getElementById('qrImg').style.display = 'block';

    startPolling(data.paymentId, cents, desc);

  } catch (err) {
    closeOverlay();
    showToast('Fout: ' + err.message);
    document.getElementById('payBtn').disabled = false;
  }
}

function startDemoPolling(fakeId, cents, desc) {
  // Na 4 seconden automatisch "betaald" simuleren
  let ticks = 0;
  pollTimer = setInterval(() => {
    ticks++;
    if (ticks >= 2) {
      clearInterval(pollTimer);
      setStatus('success', 'Betaald! ✓  (demo)');
      finishPayment(fakeId, cents, desc, 'ok');
    }
  }, 4000);
}

function openOverlay(cents, desc, ref) {
  document.getElementById('modalAmount').textContent = '€ ' + (cents / 100).toFixed(2).replace('.', ',');
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('modalRef').textContent = 'Ref: ' + ref;
  document.getElementById('qrSpinner').style.display = 'block';
  document.getElementById('qrImg').style.display = 'none';
  document.getElementById('qrImg').src = '';
  setStatus('pending', 'Wacht op betaling…');
  document.getElementById('cancelBtn').style.display = '';
  document.getElementById('newBtn').classList.remove('visible');
  document.getElementById('overlay').classList.add('visible');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('visible');
}

function setStatus(type, text) {
  const pill = document.getElementById('statusPill');
  pill.className = 'status-pill ' + type;
  pill.innerHTML = `<div class="pulse"></div><span>${text}</span>`;
  document.getElementById('statusText'); // noop, innerHTML handles it
}

async function startPolling(paymentId, cents, desc) {
  const INTERVAL = 2000;
  const TIMEOUT = 5 * 60 * 1000; // 5 min
  const start = Date.now();

  pollTimer = setInterval(async () => {
    if (Date.now() - start > TIMEOUT) {
      clearInterval(pollTimer);
      setStatus('failed', 'Verlopen (5 min)');
      finishPayment(paymentId, cents, desc, 'fail');
      return;
    }
    try {
      const res = await fetch(`${WORKER_URL}/payment/${paymentId}`);
      if (!res.ok) return;
      const data = await res.json();

      if (data.status === 'SUCCEEDED') {
        clearInterval(pollTimer);
        setStatus('success', 'Betaald! ✓');
        finishPayment(paymentId, cents, desc, 'ok');
      } else if (['FAILED', 'CANCELLED', 'EXPIRED'].includes(data.status)) {
        clearInterval(pollTimer);
        setStatus('failed', data.status === 'CANCELLED' ? 'Geannuleerd' : 'Mislukt / verlopen');
        finishPayment(paymentId, cents, desc, 'fail');
      }
    } catch (_) { /* network blip, try again */ }
  }, INTERVAL);
}

function finishPayment(id, cents, desc, result) {
  txHistory.unshift({ id, cents, desc, result, time: new Date() });
  renderHistory();
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('newBtn').classList.add('visible');
  document.getElementById('payBtn').disabled = false;
  currentPaymentId = null;
}

async function cancelPayment() {
  if (pollTimer) clearInterval(pollTimer);
  if (currentPaymentId) {
    if (!DEMO_MODE) {
      try {
        await fetch(`${WORKER_URL}/payment/${currentPaymentId}/cancel`, { method: 'DELETE' });
      } catch (_) {}
    }
    txHistory.unshift({ id: currentPaymentId, cents: getTotalCents(), desc: getDescription(), result: 'cancelled', time: new Date() });
    renderHistory();
    currentPaymentId = null;
  }
  closeOverlay();
  document.getElementById('payBtn').disabled = false;
}

function closeAndReset() {
  closeOverlay();
  clearAll();
}

// ── HISTORY ───────────────────────────────────────────────────────────
function renderHistory() {
  if (txHistory.length === 0) return;
  const panel = document.getElementById('historyPanel');
  panel.style.display = 'block';
  document.getElementById('historyList').innerHTML = txHistory.slice(0, 8).map(t => {
    const badgeClass = t.result === 'ok' ? 'ok' : t.result === 'cancelled' ? 'cancelled' : 'fail';
    const badgeText  = t.result === 'ok' ? 'Betaald' : t.result === 'cancelled' ? 'Geannuleerd' : 'Mislukt';
    const timeStr = t.time.toLocaleTimeString('nl-BE', { hour: '2-digit', minute: '2-digit' });
    return `<div class="history-item">
      <div class="h-left">
        <div class="h-amount">€ ${(t.cents / 100).toFixed(2).replace('.', ',')}</div>
        <div class="h-desc">${timeStr} · ${t.desc}</div>
      </div>
      <span class="h-badge ${badgeClass}">${badgeText}</span>
    </div>`;
  }).join('');
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── PIN ───────────────────────────────────────────────────────────────
let pinEntry = '';

function pinPress(digit) {
  if (pinEntry.length >= 4) return;
  pinEntry += digit;
  updatePinDots();
  if (pinEntry.length === 4) {
    setTimeout(checkPin, 150);
  }
}

function pinDel() {
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
  clearPinError();
}

function pinClear() {
  pinEntry = '';
  updatePinDots();
  clearPinError();
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot' + i);
    dot.classList.toggle('filled', i < pinEntry.length);
    dot.classList.remove('error');
  }
}

function checkPin() {
  if (pinEntry === PIN) {
    const screen = document.getElementById('pinScreen');
    screen.classList.add('hidden');
    setTimeout(() => screen.style.display = 'none', 300);
  } else {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('dot' + i);
      dot.classList.remove('filled');
      dot.classList.add('error');
    }
    document.getElementById('pinError').textContent = 'Verkeerde pincode, probeer opnieuw.';
    setTimeout(() => {
      pinEntry = '';
      updatePinDots();
      clearPinError();
    }, 900);
  }
}

function clearPinError() {
  document.getElementById('pinError').textContent = '';
}

// ── BOOT ──────────────────────────────────────────────────────────────
buildTabs();
buildGrid();
renderCart();
updateAmount();
</script>
